services:
  - type: web
    name: yuanxing
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: WEB_CONCURRENCY
        value: 1
      - key: GUNICORN_TIMEOUT
        value: 120
