services:
  - type: web
    name: yuanxing-final-stable
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOW_SQLITE_FALLBACK
        value: "1"
      - key: PGCONNECT_TIMEOUT
        value: "5"
      - key: ENABLE_SOCKETIO
        value: "0"
      - key: DATABASE_URL
        sync: false
