services:
  - type: web
    name: yuanxing-final-stable
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOW_SQLITE_FALLBACK
        value: "0"
      - key: PGCONNECT_TIMEOUT
        value: "3"
      - key: PGSSLMODE
        value: "require"
      - key: ENABLE_SOCKETIO
        value: "0"
      - key: YX_INIT_DB_ON_STARTUP
        value: "0"
      - key: YX_RUN_HEAVY_MIGRATION
        value: "0"
      - key: YX_REPAIR_ON_READ
        value: "0"
      - key: YX_FORCE_PROVIDED_DATABASE_URL
        value: "1"
      - key: YX_PG_POOL_MIN
        value: "1"
      - key: YX_PG_POOL_MAX
        value: "12"
      - key: YX_PG_POOL_WAIT_SECONDS
        value: "4"
      - key: YX_PG_STATEMENT_TIMEOUT_MS
        value: "3500"
      - key: DATABASE_URL
        value: postgresql://warehouse_ocr_d_user:5xOpnPjCU02QZdlMnICbRQOOKSRTyR3o@dpg-d7h1lumgvqtc73es1mjg-a.oregon-postgres.render.com/warehouse_ocr_d
