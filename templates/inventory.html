<html><body>
<input type=file id=f>
<button onclick="ocr()">OCR</button>
<textarea id=t></textarea>
<input id=q placeholder="數量">
<button onclick="save()">入庫</button>
<ul id=list></ul>

<script>
function ocr(){
let fd=new FormData();fd.append("file",f.files[0])
fetch("/api/ocr",{method:"POST",body:fd})
.then(r=>r.json()).then(d=>t.value=d.text)
}
function save(){
fetch("/api/inventory/add",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:t.value,qty:parseInt(q.value||1)})}).then(load)
}
function load(){
fetch("/api/inventory/list").then(r=>r.json()).then(d=>{
list.innerHTML=""
d.items.forEach(i=>{
let li=document.createElement("li")
li.innerText=i.name+"("+i.qty+")"
list.appendChild(li)
})
})
}
load()
</script></body></html>
