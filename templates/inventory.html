
<html><head><meta charset="utf-8"><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="card">
<h3>OCR / 新增庫存</h3>
<input type="file" id="f"><br><br>
<textarea id="t" style="width:100%;height:100px"></textarea><br>
<button class="btn" onclick="ocr()">辨識</button>
<button class="btn" onclick="add()">入庫</button>
</div>

<div class="card"><h3>庫存列表（點擊→定位倉庫）</h3><ul id="list"></ul></div>

<script>
function ocr(){
let fd=new FormData(); fd.append('file', f.files[0]);
fetch('/api/ocr',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{
 t.value=d.text; if(d.confidence<80) alert('信心低');
});
}
function add(){
fetch('/api/inventory/add',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({name:t.value,qty:1})}).then(()=>load());
}
function load(){
fetch('/api/inventory/list').then(r=>r.json()).then(d=>{
 list.innerHTML='';
 d.items.forEach(i=>{
  let li=document.createElement('li');
  li.innerText = i.name + ' ('+i.qty+') ['+(i.loc||'')+']';
  li.onclick=()=>location='/warehouse?focus='+encodeURIComponent(i.name);
  list.appendChild(li);
 });
});
}
load();
</script>
</body></html>
