
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="card">
<h3>上傳 / OCR</h3>
<input type="file" id="f"><br>
<textarea id="t" style="width:95%;height:120px"></textarea><br>
<button class="btn" onclick="doOCR()">辨識</button>
<button class="btn" onclick="save()">入庫</button>
<div id="hint"></div>
</div>
<div class="card"><h3>庫存（點擊→倉庫）</h3><ul id="list"></ul></div>
<script>
async function doOCR(){
 let fd=new FormData(); fd.append('file', f.files[0]);
 hint.innerText="辨識中...";
 let r=await fetch('/api/ocr',{method:'POST',body:fd});
 let d=await r.json();
 if(d.error){ hint.innerText=d.error; return; }
 t.value=d.text;
 if(d.confidence<80){ alert('信心值低，請確認'); }
 hint.innerText="";
}
function save(){
 fetch('/api/inventory/add',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({name:t.value,qty:1})}).then(load);
}
function load(){
 fetch('/api/inventory/list').then(r=>r.json()).then(d=>{
  list.innerHTML='';
  d.items.forEach(i=>{
    let li=document.createElement('li');
    li.innerText=i.name+' ('+i.qty+') ['+(i.loc||'')+']';
    li.onclick=()=>location='/warehouse?focus='+encodeURIComponent(i.name);
    list.appendChild(li);
  })
 })
}
setInterval(load,2000); load();
</script>
</body></html>
