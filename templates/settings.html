
{% extends "base.html" %}
{% block body %}
<div class="module-screen">
  <div class="module-topbar">
    <a class="back-btn" href="{{ url_for('home') }}">← 返回</a>
    <div class="module-title">設定</div>
    <div class="spacer"></div>
  </div>
  <div class="glass panel">
    <div class="section-title">修改密碼</div>
    <label class="field-label">舊密碼</label>
    <input class="text-input" id="old-password" type="password">
    <label class="field-label">新密碼</label>
    <input class="text-input" id="new-password" type="password">
    <label class="field-label">確認新密碼</label>
    <input class="text-input" id="confirm-password" type="password">
    <button class="primary-btn" onclick="changePassword()">儲存</button>
    <div id="settings-msg" class="alert hidden"></div>
  </div>
</div>
{% endblock %}
