<input id=c placeholder=客戶>
<input id=p placeholder=商品>
<input id=q placeholder=數量>
<button onclick="s()">出貨</button>
<ul id=l></ul>
<script>
function s(){
fetch("/api/shipping",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({customer:c.value,product:p.value,qty:parseInt(q.value)})})
.then(r=>r.json()).then(d=>alert(d.success?"成功":d.error))
}
</script>
