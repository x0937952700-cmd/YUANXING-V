
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="card">
<h3>出貨（先總單→訂單→庫存）</h3>
<input id="c" placeholder="客戶"><br>
<input id="p" placeholder="商品"><br>
<input id="q" placeholder="數量"><br>
<button class="btn" onclick="ship()">出貨</button>
</div>
<div class="card"><h3>出貨查詢</h3><ul id="list"></ul></div>
<script>
function ship(){
 if(!confirm('確認出貨？')) return;
 fetch('/api/shipping',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({customer:c.value,product:p.value,qty:parseInt(q.value||'0')})})
 .then(r=>r.json()).then(d=>alert(d.success?'完成':d.error));
}
function load(){
 fetch('/api/shipping_records').then(r=>r.json()).then(d=>{
  list.innerHTML='';
  d.items.forEach(i=>{
    let li=document.createElement('li');
    li.innerText=i.customer+' - '+i.product+' x '+i.qty+' @ '+i.time+' by '+i.user;
    list.appendChild(li);
  })
 })
}
setInterval(load,2000); load();
</script>
</body></html>
