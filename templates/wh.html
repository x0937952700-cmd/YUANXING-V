
<html><head><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div id=g style="display:grid;grid-template-columns:repeat(5,1fr)"></div>
<script>
for(let i=1;i<=20;i++){
let d=document.createElement('div')
d.innerText=i
d.style.border='1px solid';d.style.padding='20px'
g.appendChild(d)
}
</script>
</body></html>
