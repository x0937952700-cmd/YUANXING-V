
<link rel="stylesheet" href="/static/style.css">
<div class="container">
<div class="card">
<table width="100%" id="t"></table>
</div>
</div>
<script>
fetch("/api/logs").then(r=>r.json()).then(d=>{
let html=""
d.items.forEach(i=>{
html+=`<tr><td>${i.user}</td><td>${i.action}</td><td>${i.time}</td></tr>`
})
t.innerHTML=html
})
</script>
