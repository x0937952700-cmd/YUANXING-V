<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="/static/style.css"></head>
<body>
<h3>出貨</h3>
<input id="p" placeholder="商品"><input id="q" placeholder="數量">
<button onclick="send()">出貨</button>
<script>
function send(){
 fetch('/api/shipping',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({customer:'測試', product:p.value, qty:parseInt(q.value||'0')})})
 .then(r=>r.json()).then(d=>{ alert(d.success?'成功':'失敗'); });
}
</script>
</body>
</html>
