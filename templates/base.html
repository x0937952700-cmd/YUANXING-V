<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#7b4a26">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=stability-v6">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=stability-v6">
  <script>
    window.__YX_MASTER_BRIDGE_VERSION__='stability-v6';
    window.__YX124_BLOCK_LEGACY_VISUAL_BOOT__=true;
    window.__YX_STABILITY_LOCK__=true;
    document.documentElement.dataset.yxStableUi='v6';
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=stability-v6">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/ornate_label_hardlock.css') }}?v=stability-v6">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/home_background_hardlock.css') }}?v=stability-v6">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/fix142_speed_ship_hardlock.css') }}?v=stability-v6">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/fix98_button_visibility_final.css') }}?v=stability-v6">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/yx_final_stability_lock.css') }}?v=stability-v6">
  <script>window.__YX_USERNAME__ = {{ (username or '')|tojson }}; window.__YX_PAGE_ENDPOINT__ = {{ (request.endpoint or '')|tojson }};</script>
  {% if (request.endpoint or '') not in ['login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/core_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/ornate_label_hardlock.js') }}?v=stability-v6"></script>
  {% endif %}
  {% if (request.endpoint or '') not in ['home','login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/quantity_rule_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='app.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/today_changes_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/warehouse_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/settings_audit_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/customer_regions_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/product_sort_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/product_actions_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/product_source_bridge_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/ship_picker_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/ship_text_validate_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/inline_edit_full_list_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix142_speed_ship_hardlock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix98_ship_repair_keep142.js') }}?v=stability-v6"></script>
  {% endif %}
  <script defer src="{{ url_for('static', filename='yx_modules/yx_final_stability_lock.js') }}?v=stability-v6"></script>
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=stability-v6"></script>
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card glass confirm-card">
      <div class="modal-head">
        <div class="section-title" id="confirm-title">請確認</div>
      </div>
      <div id="confirm-message" class="muted confirm-message"></div>
      <div class="btn-row">
        <button class="ghost-btn" id="confirm-cancel-btn" type="button">取消</button>
        <button class="primary-btn" id="confirm-ok-btn" type="button">確認</button>
      </div>
    </div>
  </div>
</body>
</html>
