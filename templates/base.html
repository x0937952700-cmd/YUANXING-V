<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#e5edf5">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=stable-v7-single-ui">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}?v=stable-v7-single-ui">
  <link rel="stylesheet" href="{{ url_for('static', filename='stability_final.css') }}?v=stable-v7-single-ui">
  <script>window.__YX_USERNAME__={{ (username or '')|tojson }}; window.__YX_SINGLE_UI_LOCK__='stable-v7';</script>
  {% if request.endpoint == 'today_changes_page' %}
  <script defer src="{{ url_for('static', filename='today_clean.js') }}?v=stable-v7-single-ui"></script>
  {% elif request.endpoint != 'login_page' %}
  <script defer src="{{ url_for('static', filename='clean_app.js') }}?v=stable-v7-single-ui"></script>
  {% endif %}
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=stable-v7-single-ui"></script>
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
