<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#7b4a26">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="yx-build-version" content="fix146-hard-lock-fix143-fix144-combo">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=fix146-hard-lock-fix143-fix144-combo">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=fix146-hard-lock-fix143-fix144-combo">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180x180.png') }}?v=fix146-hard-lock-fix143-fix144-combo">
  <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}?v=fix146-hard-lock-fix143-fix144-combo">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=fix146-hard-lock-fix143-fix144-combo">
  <script>window.__YX_BUILD_VERSION__ = 'fix146-hard-lock-fix143-fix144-combo'; window.__YX_FIX128_MARKER__ = 'FIX146_HARD_LOCK_FIX143_FIX144_COMBO'; window.__YX_FIX129_MARKER__ = 'FIX146_HARD_LOCK_FIX143_FIX144_COMBO'; window.__YX_FIX133_MARKER__ = 'FIX146_HARD_LOCK_FIX143_FIX144_COMBO'; window.__YX_FIX135_MARKER__ = 'FIX146_HARD_LOCK_FIX143_FIX144_COMBO'; window.__YX_FIX140_MARKER__ = 'FIX146_HARD_LOCK_FIX143_FIX144_COMBO'; window.__YX_FORCE_NO_OLD_UI__ = true; window.__YX_USERNAME__ = {{ (username or '')|tojson }}; window.__YX_PAGE_ENDPOINT__ = {{ (request.endpoint or '')|tojson }};</script>
  {% if (request.endpoint or '') not in ['home','login_page'] %}
  <script defer src="{{ url_for('static', filename='app.js') }}?v=fix146-hard-lock-fix143-fix144-combo"></script>
  {% endif %}
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=fix146-hard-lock-fix143-fix144-combo"></script>
  <!-- FIX111_FAST_NAV_AND_RETURN_HOME_OPTIMIZE -->
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
  {% if (request.endpoint or '') == 'home' %}
  <script>
  (function(){
    'use strict';
    const VERSION = 'fix146-hard-lock-fix143-fix144-combo';
    function ready(fn){ if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn, {once:true}); else fn(); }
    function setBadge(n){
      const btn = document.getElementById('today-changes-btn');
      if(!btn) return;
      let badge = document.getElementById('today-changes-home-badge');
      if(!badge){ badge = document.createElement('span'); badge.id = 'today-changes-home-badge'; badge.className = 'today-home-badge'; btn.appendChild(badge); }
      n = Number(n || 0);
      badge.textContent = n > 99 ? '99+' : String(n);
      badge.style.display = n > 0 ? 'inline-flex' : 'none';
      btn.classList.toggle('has-unread', n > 0);
    }
    ready(function(){
      try { document.documentElement.dataset.yxFix130Home = VERSION; } catch(_e) {}
      const logoutBtn = document.getElementById('home-logout-btn');
      if (logoutBtn && !logoutBtn.dataset.yxLogoutBound) {
        logoutBtn.dataset.yxLogoutBound = '1';
        logoutBtn.addEventListener('click', function(){
          logoutBtn.disabled = true;
          logoutBtn.textContent = '登出中…';
          fetch('/api/logout', {method:'POST', credentials:'same-origin', headers:{'Content-Type':'application/json'}, body:'{}'})
            .finally(function(){ location.href = '/login'; });
        });
      }
      fetch('/api/today-changes?summary_only=1&v=' + encodeURIComponent(VERSION), {credentials:'same-origin', cache:'no-store'})
        .then(r => r.ok ? r.json() : null)
        .then(d => { if(d && d.success !== false) setBadge((d.summary || {}).unread_count || 0); })
        .catch(function(){});
    });
  })();
  </script>
  {% endif %}

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card glass confirm-card">
      <div class="modal-head">
        <div class="section-title" id="confirm-title">請確認</div>
      </div>
      <div id="confirm-message" class="muted confirm-message"></div>
      <div class="btn-row">
        <button class="ghost-btn" id="confirm-cancel-btn" type="button">取消</button>
        <button class="primary-btn" id="confirm-ok-btn" type="button">確認</button>
      </div>
    </div>
  </div>
</body>
</html>
