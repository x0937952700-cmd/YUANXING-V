<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#7b4a26">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="yx-build-version" content="fix121-order-master-customer-items-hard-connect">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=fix121-order-master-customer-items-hard-connect">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=fix121-order-master-customer-items-hard-connect">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180x180.png') }}?v=fix121-order-master-customer-items-hard-connect">
  <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}?v=fix121-order-master-customer-items-hard-connect">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=fix121-order-master-customer-items-hard-connect">
  <script>window.__YX_BUILD_VERSION__ = 'fix121-order-master-customer-items-hard-connect'; window.__YX_FORCE_NO_OLD_UI__ = true; window.__YX_USERNAME__ = {{ (username or '')|tojson }}; window.__YX_PAGE_ENDPOINT__ = {{ (request.endpoint or '')|tojson }};</script>
  {% if (request.endpoint or '') not in ['home','login_page'] %}
  <script defer src="{{ url_for('static', filename='app.js') }}?v=fix121-order-master-customer-items-hard-connect"></script>
  {% endif %}
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=fix121-order-master-customer-items-hard-connect"></script>
  <!-- FIX111_FAST_NAV_AND_RETURN_HOME_OPTIMIZE -->
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card glass confirm-card">
      <div class="modal-head">
        <div class="section-title" id="confirm-title">請確認</div>
      </div>
      <div id="confirm-message" class="muted confirm-message"></div>
      <div class="btn-row">
        <button class="ghost-btn" id="confirm-cancel-btn" type="button">取消</button>
        <button class="primary-btn" id="confirm-ok-btn" type="button">確認</button>
      </div>
    </div>
  </div>
</body>
</html>
