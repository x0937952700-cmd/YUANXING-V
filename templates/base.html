<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#7b4a26">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=fix131-table-only-master-hardlock">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=fix131-table-only-master-hardlock">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180x180.png') }}?v=fix131-table-only-master-hardlock">
  <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}?v=fix131-table-only-master-hardlock">
  <script>document.documentElement.dataset.yx117AppleUi="locked";document.documentElement.dataset.yx118AppleUi="locked";document.documentElement.dataset.yx124OrnateLabel="locked";</script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=fix131-table-only-master-hardlock">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/ornate_label_hardlock.css') }}?v=fix131-table-only-master-hardlock">
  <script>window.__YX_USERNAME__ = {{ (username or '')|tojson }}; window.__YX_PAGE_ENDPOINT__ = {{ (request.endpoint or '')|tojson }};</script>
  {% if (request.endpoint or '') not in ['login_page'] %}
  <!-- FIX124：圓型標籤獨立接母版。首頁也載入，不再依賴舊黑色標籤；功能頁 app.js 只當功能庫。 -->
  <script>window.__YX_MASTER_BRIDGE_VERSION__='fix131-table-only-master-hardlock';window.__YX124_MASTER_FIRST__=true;window.__YX124_BLOCK_LEGACY_VISUAL_BOOT__=true;</script>
  <script defer src="{{ url_for('static', filename='yx_modules/core_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/ornate_label_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  {% endif %}
  {% if (request.endpoint or '') not in ['home','login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/quantity_rule_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='app.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/today_changes_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/warehouse_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/settings_audit_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/customer_regions_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/product_sort_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/product_actions_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/product_source_bridge_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/ship_picker_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/inline_edit_full_list_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/legacy_isolation_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/apple_ui_hardlock.js') }}?v=fix131-table-only-master-hardlock"></script>
  {% endif %}
  {% if (request.endpoint or '') not in ['login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/master_integrator.js') }}?v=fix131-table-only-master-hardlock"></script>
  {% endif %}
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=fix131-table-only-master-hardlock"></script>
  <!-- FIX128_INLINE_EDIT_FULL_LIST_HARDLOCK -->
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card glass confirm-card">
      <div class="modal-head">
        <div class="section-title" id="confirm-title">請確認</div>
      </div>
      <div id="confirm-message" class="muted confirm-message"></div>
      <div class="btn-row">
        <button class="ghost-btn" id="confirm-cancel-btn" type="button">取消</button>
        <button class="primary-btn" id="confirm-ok-btn" type="button">確認</button>
      </div>
    </div>
  </div>
</body>
</html>
