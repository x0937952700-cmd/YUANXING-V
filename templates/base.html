<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ title or '沅興木業' }}</title><link rel="icon" href="{{ url_for('static', filename='favicon.png') }}"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><div class="page-shell">{% block body %}{% endblock %}</div><script>document.addEventListener('click',e=>{let b=e.target.closest('[data-demo]');if(b){e.preventDefault();alert('乾淨介面版：此按鈕已保留外觀，功能之後再逐步接上。')}});async function dbCheck(){const el=document.querySelector('[data-db-status]');if(!el)return;try{const r=await fetch('/api/db-check');const j=await r.json();el.textContent=j.ok?'資料庫：已連線':'資料庫：未連線';el.className='home-mini-btn db-pill '+(j.ok?'ok':'bad');}catch(e){el.textContent='資料庫：檢查失敗';el.className='home-mini-btn db-pill bad';}}</script></body></html>
