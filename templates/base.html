<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#7b4a26">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=pack31-clean-final">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=pack31-clean-final">
  <script>
    document.documentElement.dataset.yxSingleFinal="pack31";
    window.__YX_USERNAME__ = {{ (username or '')|tojson }};
    window.__YX_PAGE_ENDPOINT__ = {{ (request.endpoint or '')|tojson }};
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=pack31-base">
  <link rel="stylesheet" href="{{ url_for('static', filename='clean_override.css') }}?v=pack31-base">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_commercial_ui_lock.css') }}?v=pack31-core">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_pack31_clean_final.css') }}?v=pack31-clean-final">
  <script defer src="{{ url_for('static', filename='clean_ui_static.js') }}?v=pack31-base"></script>
  <script defer src="{{ url_for('static', filename='yx_commercial_ui_lock.js') }}?v=pack31-core"></script>
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=pack31-base"></script>
  <script defer src="{{ url_for('static', filename='yx_pack31_clean_final.js') }}?v=pack31-clean-final"></script>
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
  <div id="clean-toast" class="clean-toast hidden">完成</div>
</body>
</html>
