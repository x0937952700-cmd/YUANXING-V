<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or '沅興木業' }}</title>
  <meta name="theme-color" content="#7b4a26">
  <meta name="application-name" content="沅興木業">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="沅興木業">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v=fix145-consolidated-master">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=fix145-consolidated-master">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180x180.png') }}?v=fix145-consolidated-master">
  <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}?v=fix145-consolidated-master">
  <script>
    window.__YX_MASTER_BRIDGE_VERSION__='fix145-consolidated-master';
    window.__YX145_DEPRECATED_MASTERS_DISABLED__=true;
    window.__YX_LEGACY_ASSIST_ONLY__=true;
    window.__YX124_BLOCK_LEGACY_VISUAL_BOOT__=true;
    document.documentElement.dataset.yx145ConsolidatedMaster='locked';
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=fix145-consolidated-master">
  <link rel="stylesheet" href="{{ url_for('static', filename='yx_modules/fix144_modular_master.css') }}?v=fix145-consolidated-master">
  <script>window.__YX_USERNAME__ = {{ (username or '')|tojson }}; window.__YX_PAGE_ENDPOINT__ = {{ (request.endpoint or '')|tojson }};</script>
  {% if (request.endpoint or '') not in ['login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/core_hardlock.js') }}?v=fix145-consolidated-master"></script>
  {% endif %}
  {% if (request.endpoint or '') not in ['home','login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/quantity_rule_hardlock.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='app.js') }}?v=fix145-consolidated-master"></script>
  {% endif %}
  {% if (request.endpoint or '') not in ['login_page'] %}
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_master_bootstrap.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_page_home_master.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_page_products_master.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_page_customers_master.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_page_shipping_master.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_page_warehouse_master.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix145_consolidation_guard.js') }}?v=fix145-consolidated-master"></script>
  <script defer src="{{ url_for('static', filename='yx_modules/fix144_final_guard.js') }}?v=fix145-consolidated-master"></script>
  {% endif %}
  <script defer src="{{ url_for('static', filename='pwa.js') }}?v=fix145-consolidated-master"></script>
</head>
<body>
  <div class="page-shell">
    {% block body %}{% endblock %}
  </div>
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card glass confirm-card">
      <div class="modal-head">
        <div class="section-title" id="confirm-title">請確認</div>
      </div>
      <div id="confirm-message" class="muted confirm-message"></div>
      <div class="btn-row">
        <button class="ghost-btn" id="confirm-cancel-btn" type="button">取消</button>
        <button class="primary-btn" id="confirm-ok-btn" type="button">確認</button>
      </div>
    </div>
  </div>
</body>
</html>
