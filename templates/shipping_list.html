<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="/static/style.css"></head>
<body>
<h3>出貨查詢</h3>
<ul id="list"></ul>
<script>
function load(){
 fetch('/api/shipping/list').then(r=>r.json()).then(d=>{
  list.innerHTML='';
  d.items.forEach(i=>{
    let li=document.createElement('li');
    li.innerText = `${i.customer} - ${i.product} x ${i.qty} @ ${i.time}`;
    list.appendChild(li);
  })
 })
}
load();
</script>
</body>
</html>
