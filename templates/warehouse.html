<link rel="stylesheet" href="/static/style.css"><div class="container"><div class="card">
<input id="s" oninput="search()"><div id="g"></div>
<script>
let data={}
fetch("/api/warehouse").then(r=>r.json()).then(d=>{data=d;render()})
function render(){
let g=document.getElementById("g")
g.innerHTML=""
for(let i=1;i<=30;i++){
let d=document.createElement("div")
d.className="card"
d.innerText=i
d.onclick=()=>add(i)
g.appendChild(d)}
}
function add(i){
let name=prompt("商品")
if(!data[i])data[i]=[]
data[i].push(name)
fetch("/api/warehouse",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)})
}
function search(){
let v=s.value
document.querySelectorAll(".card").forEach((d,i)=>{
d.style.background=(data[i+1]||[]).some(x=>x.includes(v))?"yellow":"white"
})
}
</script>
</div></div>
