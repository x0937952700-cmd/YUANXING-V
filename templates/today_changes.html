{% extends "base.html" %}
{% block body %}
<div class="today-shell">
  <div class="module-topbar today-shell-header">
    <a class="back-btn" href="{{ url_for('home') }}">← 返回</a>
    <div class="module-title">今日異動</div>
    <div class="pill subtle-pill" id="today-unread-badge">0</div>
  </div>

  <div class="glass panel today-summary-panel">
    <div class="section-head compact-head">
      <div>
        <div class="section-kicker">Notification Center</div>
        <div class="section-title">通知中心</div>
      </div>
      <div class="btn-row compact">
        <button id="today-unread-toggle" class="ghost-btn small-btn" onclick="toggleTodayUnreadFilter()">只看未讀</button>
        <button class="ghost-btn small-btn" onclick="markTodayChangesRead()">清除已讀</button>
      </div>
    </div>
    <div id="today-summary-cards" class="card-list stats-grid"></div>
  </div>

  <div class="today-feed-layout">
    <div class="today-feed-column">
      <div class="glass panel today-filter-panel">
        <div class="today-filter-bar">
          <button class="chip active" id="today-filter-all" onclick="setTodayCategoryFilter('all')">全部</button>
          <button class="chip" id="today-filter-inbound" onclick="setTodayCategoryFilter('inbound')">入庫</button>
          <button class="chip" id="today-filter-outbound" onclick="setTodayCategoryFilter('outbound')">出貨</button>
          <button class="chip" id="today-filter-warehouse" onclick="setTodayCategoryFilter('warehouse')">倉庫</button>
          <button class="chip" id="today-filter-ocr" onclick="setTodayCategoryFilter('ocr')">OCR</button>
          <button class="chip" id="today-filter-mine" onclick="setTodayCategoryFilter('mine')">我操作的</button>
        </div>
      </div>
      <div id="today-activity-list" class="notification-feed"></div>
    </div>
    <div id="today-detail-panel" class="glass panel detail-side-card hidden"></div>
  </div>
</div>
{% endblock %}
