{% extends "base.html" %}
{% block body %}
<div class="home-shell">
  <div class="home-header glass">
    <a class="back-btn" href="{{ url_for('home') }}">← 返回</a>
    <h1 class="brand center">今日異動</h1>
    <div></div>
  </div>
  <div class="glass feature-card">
    <div class="section-head">
      <h3>今日異動</h3>
      <span class="muted">依進貨 / 出貨分類，並顯示異常比對與未錄入倉庫圖提醒</span>
    </div>
    <div class="card-list" id="today-summary-cards"></div>
    <div class="today-columns">
      <div class="glass panel"><div class="section-title">進貨 / 其他異動</div><div id="today-inbound-list" class="chip-list"></div></div>
      <div class="glass panel"><div class="section-title">出貨</div><div id="today-outbound-list" class="chip-list"></div></div>
    </div>
    <div class="glass panel">
      <div class="section-title">異常比對 / 未錄入倉庫圖</div>
      <div id="today-anomaly-list" class="chip-list"></div>
    </div>
  </div>
</div>
{% endblock %}
