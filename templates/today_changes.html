{% extends "base.html" %}
{% block body %}
<div class="home-shell">
  <div class="home-header glass">
    <a class="back-btn" href="{{ url_for('home') }}">← 返回</a>
    <h1 class="brand center">今日異動</h1>
    <div></div>
  </div>
  <div class="glass feature-card">
    <div class="section-head yx111-today-head">
      <h3>今日異動</h3>
      <button id="today-manual-refresh-btn" class="ghost-btn small-btn" type="button">刷新</button>
    </div>
    <div class="today-filter-bar yx105-hidden" hidden>
      <button class="chip active" id="today-filter-all" type="button" data-today-filter="all">全部</button>
      <button class="chip" id="today-filter-inbound" type="button" data-today-filter="inbound">進貨</button>
      <button class="chip" id="today-filter-outbound" type="button" data-today-filter="outbound">出貨</button>
      <button class="chip" id="today-filter-orders" type="button" data-today-filter="orders">新增訂單</button>
      <button class="chip" id="today-filter-unplaced" type="button" data-today-filter="unplaced">未錄入</button>
    </div>
    <div id="today-summary-cards" class="card-list yx111-today-root" data-yx111-only="1">
      <div class="yx111-today-stack">
        <button type="button" class="yx111-today-card" data-yx111-today-filter="inbound"><span class="yx111-today-title">進貨</span><span class="yx111-today-count"><b>0</b><em>筆</em></span></button>
        <button type="button" class="yx111-today-card" data-yx111-today-filter="outbound"><span class="yx111-today-title">出貨</span><span class="yx111-today-count"><b>0</b><em>筆</em></span></button>
        <button type="button" class="yx111-today-card" data-yx111-today-filter="orders"><span class="yx111-today-title">新增訂單</span><span class="yx111-today-count"><b>0</b><em>筆</em></span></button>
        <button type="button" class="yx111-today-card" data-yx111-today-filter="unplaced"><span class="yx111-today-title">未入倉</span><span class="yx111-today-count"><b>0</b><em>件</em></span></button>
      </div>
    </div>

    <div class="today-columns today-columns-4 today-columns-vertical">
      <div class="glass panel" data-today-panel="inbound"><div class="section-title">進貨</div><div id="today-inbound-list" class="chip-list stacked-list"></div></div>
      <div class="glass panel" data-today-panel="outbound"><div class="section-title">出貨</div><div id="today-outbound-list" class="chip-list stacked-list"></div></div>
      <div class="glass panel" data-today-panel="orders"><div class="section-title">新增訂單</div><div id="today-order-list" class="chip-list stacked-list"></div></div>
      <div class="glass panel" data-today-panel="unplaced"><div class="section-title">未錄入倉庫圖</div><div id="today-unplaced-list" class="chip-list stacked-list"></div></div>
    </div>
  </div>
  <div id="fix28-operation-anchor"></div>
</div>
{% endblock %}
