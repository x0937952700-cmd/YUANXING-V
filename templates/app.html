<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>沅興木業｜CLEAN V1</title>
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-title">沅興木業</div>
    <div class="top-actions">
      <button class="pill" data-nav="settings">設定</button>
      <button class="pill badge-pill" data-nav="activity">今日異動 <span id="activityBadge" class="badge hidden">0</span></button>
      <button id="logoutBtn" class="pill danger">登出</button>
    </div>
    <div class="user-line"><span id="userName">使用者</span>｜<span id="todayText"></span></div>
  </header>

  <main id="appRoot">
    <section id="home" class="page active"></section>
    <section id="inventory" class="page"></section>
    <section id="orders" class="page"></section>
    <section id="master" class="page"></section>
    <section id="inbound" class="page"></section>
    <section id="shipping" class="page"></section>
    <section id="warehouse" class="page"></section>
    <section id="customers" class="page"></section>
    <section id="activity" class="page"></section>
    <section id="shippingRecords" class="page"></section>
    <section id="settings" class="page"></section>
  </main>

  <div id="toastHost" class="toast-host"></div>
  <dialog id="modal" class="modal-card"></dialog>
  <script type="module" src="/static/js/core.js"></script>
</body>
</html>
