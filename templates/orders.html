
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="card">
<h3>建立訂單（建立即扣庫存）</h3>
<input id="c" placeholder="客戶"><br>
<input id="p" placeholder="商品"><br>
<input id="q" placeholder="數量"><br>
<button class="btn" onclick="send()">建立</button>
</div>
<div class="card"><h3>訂單列表（點→倉庫）</h3><ul id="list"></ul></div>
<script>
function send(){
 fetch('/api/order/create',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({customer:c.value,product:p.value,qty:parseInt(q.value||'0')})})
 .then(r=>r.json()).then(d=>alert(d.success?'完成':d.error));
}
function load(){
 fetch('/api/orders/list').then(r=>r.json()).then(d=>{
  list.innerHTML='';
  d.items.forEach(i=>{
    let li=document.createElement('li');
    li.innerText=i.customer+' - '+i.product+' x '+i.qty;
    li.onclick=()=>location='/warehouse?focus='+encodeURIComponent(i.product);
    list.appendChild(li);
  })
 })
}
setInterval(load,2000); load();
</script>
</body></html>
