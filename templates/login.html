
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#f4f4f4;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:white;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.2);width:320px}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(#888,#555);color:#fff;font-size:16px}
.msg{text-align:center;color:red}
</style>
</head>
<body>

<div class="card">
<h2>沅興木業 ERP</h2>
<input id="u" placeholder="姓名">
<input id="p" type="password" placeholder="密碼">
<button onclick="login()">登入 / 註冊</button>
<div id="msg" class="msg"></div>
</div>

<script>
function login(){
fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:u.value,
password:p.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.success){
localStorage.setItem("user",u.value)
window.location="/"
}else{
msg.innerText="密碼錯誤"
}
})
}
</script>

</body>
</html>
