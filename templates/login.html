
<html>
<head><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="card">
<div class="title">沅興木業</div>
<input id="u" placeholder="姓名">
<input id="p" type="password" placeholder="密碼">
<button class="btn" onclick="login()">登入</button>
</div>
<script>
function login(){
fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.json()).then(d=>{
if(d.success){location="/"}else{alert("錯誤")}
})
}
</script>
</body>
</html>
