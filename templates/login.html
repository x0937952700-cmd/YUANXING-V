<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>沅興木業</title>

<style>
body{
    margin:0;
    background:#f5f3ef;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:360px;
    background:#fff;
    border-radius:24px;
    padding:30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:20px;
    background:#2b2b2b;
    color:#fff;
    font-size:18px;
    margin-top:10px;
}

.msg{
    margin-top:10px;
    color:red;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">沅興木業</div>

    <input id="username" placeholder="輸入姓名">
    <input id="password" type="password" placeholder="設定/輸入密碼">

    <button onclick="login()">登入</button>

    <div id="msg" class="msg"></div>
</div>

<script>
async function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try{
        const res = await fetch(window.location.origin + "/login", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:username,
                password:password
            })
        });

        const data = await res.json();

        if(!res.ok){
            document.getElementById("msg").innerText = data.msg;
            return;
        }

        window.location.href = "/home";

    }catch(e){
        document.getElementById("msg").innerText = "連線失敗（後端沒回應）";
    }
}
</script>

</body>
</html>
