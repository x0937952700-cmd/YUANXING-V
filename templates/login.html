<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>登入</title></head>
<body style="font-family:sans-serif;text-align:center;margin-top:80px">
<h2>登入</h2>
<input id="username" placeholder="姓名"><br><br>
<input id="password" type="password" placeholder="密碼"><br><br>
<button onclick="login()">登入</button>

<script>
function login(){
fetch("/api/login",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.success){ location.href="/" }
else{ alert(d.error) }
})
}
</script>
</body>
</html>
