
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>
<body>

<input id="u" placeholder="姓名">
<input id="p" type="password" placeholder="密碼">
<button onclick="login()">登入</button>

<script>
function login(){
fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:u.value,
password:p.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.success){
window.location="/"
}else{
alert("登入失敗")
}
})
}
</script>

</body>
</html>
