{% extends "base.html" %}{% block body %}<div class="home-screen"><div class="hero"><div class="eyebrow">沅興木業工作台</div><h1 class="page-title">沅興木業</h1><div class="home-top-actions centered-actions"><div class="home-mini-btn user-cell">{{ username }}</div><a class="home-mini-btn" href="{{ url_for('settings_page') }}">設定</a><a class="home-mini-btn" href="{{ url_for('today_changes_page') }}">今日異動</a><button class="home-mini-btn db-pill {{ 'ok' if db_status.ok else 'bad' }}" data-db-status onclick="dbCheck()">資料庫：{{ '已連線' if db_status.ok else '未連線' }}</button></div></div><div class="home-menu vertical">{% for key,name in pages.items() %}<a class="menu-btn" href="/{{ key }}">{{ name }}</a>{% endfor %}</div></div>{% endblock %}
