{% extends "base.html" %}
{% block body %}
<div class="home-screen premium-home">
  <div class="home-fixed-brand glass">
    <div class="brand-lockup">
      <div class="eyebrow">Yuan Xing Timber Workspace</div>
      <h1 class="page-title">沅興木業</h1>
      <div class="muted">原生 OCR、倉庫管理、出貨與客戶資料整合工作台</div>
    </div>
    <div class="home-top-actions centered-actions">
      <div class="home-mini-btn user-cell">{{ username }}</div>
      <a class="home-mini-btn" href="{{ url_for('settings_page') }}">設定</a>
      <a class="home-mini-btn notification-btn" id="today-changes-btn" href="{{ url_for('today_changes_page') }}">今日異動</a>
    </div>
  </div>

  <div class="glass panel home-menu-board">
    <div class="section-head compact-head">
      <div>
        <div class="section-kicker">主要功能</div>
        <div class="section-title">作業入口</div>
      </div>
      <div class="pill subtle-pill" id="offline-sync-pill">已同步</div>
    </div>
    <div class="home-menu vertical">
      <a class="menu-btn" href="{{ url_for('inventory_page') }}" target="_self">庫存</a>
      <a class="menu-btn" href="{{ url_for('orders_page') }}" target="_self">訂單</a>
      <a class="menu-btn" href="{{ url_for('master_order_page') }}" target="_self">總單</a>
      <a class="menu-btn" href="{{ url_for('ship_page') }}" target="_self">出貨</a>
      <a class="menu-btn" href="{{ url_for('shipping_query_page') }}" target="_self">出貨查詢</a>
      <a class="menu-btn" href="{{ url_for('warehouse_page') }}" target="_self">倉庫圖</a>
      <a class="menu-btn" href="{{ url_for('customers_page') }}" target="_self">客戶資料</a>
    </div>
  </div>
</div>
{% endblock %}
