{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="page-title-row"><h1>入庫 / 文字整理</h1><a class="pill light" href="/home">返回主頁</a></div>
  <div class="toolbar"><input id="customerInput" list="customerList" placeholder="客戶名稱，不填則入庫存"><input id="materialInput" placeholder="材質"><datalist id="customerList"></datalist></div>
  <div class="upload-row">
    <label class="secondary file-btn">原生相簿辨識/上傳檔案<input id="fileInput" type="file" accept="image/*" hidden></label>
    <label class="primary file-btn">原生相機辨識/拍照<input id="cameraInput" type="file" accept="image/*" capture="environment" hidden></label>
  </div>
  <p class="muted">PWA 版先使用拍照/上傳後貼文字整理；低信心也可手動貼上再送出。</p>
  <textarea id="textInput" rows="10" placeholder="貼上 OCR 文字或手動輸入，例如：&#10;132x23x05=249x3&#10;179x___=131x4"></textarea>
  <div class="actions"><button id="parseBtn" class="secondary">整理格式</button><button id="submitInbound" class="primary">確認入庫</button></div>
  <div id="preview" class="product-list"></div>
</section>
{% endblock %}
