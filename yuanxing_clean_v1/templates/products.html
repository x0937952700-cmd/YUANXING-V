{% extends 'base.html' %}
{% block content %}
<section class="panel" data-source="{{ source }}">
  <div class="page-title-row">
    <h1>{{ title }}</h1>
    <a class="pill light" href="/home">返回主頁</a>
  </div>
  {% if source != 'inventory' %}
  <div class="regions" id="regions">
    <div class="region-card" data-region="north"><h3>北區</h3><div class="chips"></div></div>
    <div class="region-card" data-region="central"><h3>中區</h3><div class="chips"></div></div>
    <div class="region-card" data-region="south"><h3>南區</h3><div class="chips"></div></div>
  </div>
  {% endif %}
  <div class="toolbar">
    {% if source != 'inventory' %}<input id="customerInput" class="customer-autocomplete" placeholder="客戶名稱，打一個字會提示" list="customerList">{% endif %}
    <input id="searchInput" placeholder="搜尋尺寸 / 材質 / 客戶">
    <button class="secondary" id="clearSearch">清除</button>
  </div>
  <datalist id="customerList"></datalist>
  <form id="productForm" class="card-grid form-grid">
    {% if source != 'inventory' %}<input name="customer_name" placeholder="客戶名稱" list="customerList">{% endif %}
    <input name="material" placeholder="材質">
    <input name="size_text" placeholder="尺寸 132x23x05">
    <input name="qty_expr" placeholder="數量 249x3 或 304x2+114">
    <button class="primary" type="submit">確認送出</button>
  </form>
  <div class="batch-bar">
    <input id="batchMaterial" placeholder="批量材質">
    <button class="secondary" id="applyMaterial">批量加入材質</button>
    <button class="danger" id="batchDelete">批量刪除</button>
  </div>
  <div id="list" class="product-list"></div>
</section>
{% endblock %}
