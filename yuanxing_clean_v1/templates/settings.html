{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="page-title-row"><h1>設定</h1><a class="pill light" href="/home">返回主頁</a></div>
  <div class="card"><h3>目前使用者</h3><p>{{ user }}</p><input id="newPassword" type="password" placeholder="新密碼"><button id="changePassword" class="secondary">修改密碼</button></div>
  <div class="card"><h3>備份</h3><a class="primary inline" href="/api/backup">下載備份</a></div>
  <div class="card"><h3>系統健康檢查</h3><button id="healthBtn" class="secondary">檢查</button><pre id="healthOut"></pre></div>
  {% if is_admin %}<div class="card"><h3>管理員 / 黑名單</h3><div id="userList"></div></div>{% endif %}
</section>
{% endblock %}
