{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="page-title-row"><h1>客戶資料</h1><a class="pill light" href="/home">返回主頁</a></div>
  <form id="customerForm" class="form-grid"><input name="name" placeholder="客戶名稱"><select name="region"><option value="north">北區</option><option value="central">中區</option><option value="south">南區</option></select><input name="common_materials" placeholder="常用材質"><input name="common_sizes" placeholder="常用尺寸"><button class="primary">儲存客戶</button></form>
  <div class="regions" id="regions"><div class="region-card" data-region="north"><h3>北區</h3><div class="chips"></div></div><div class="region-card" data-region="central"><h3>中區</h3><div class="chips"></div></div><div class="region-card" data-region="south"><h3>南區</h3><div class="chips"></div></div></div>
</section>
{% endblock %}
