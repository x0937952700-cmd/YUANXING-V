{% extends 'base.html' %}
{% set page='login' %}
{% block content %}
<section class="login-shell">
  <div class="login-card glass-card">
    <h1>沅興木業</h1>
    <p class="muted">乾淨主線 CLEAN V1</p>
    <form id="loginForm" class="stack">
      <input name="username" autocomplete="username" placeholder="姓名" required>
      <input name="password" autocomplete="current-password" type="password" placeholder="密碼" required>
      <button class="primary" type="submit">登入</button>
    </form>
    <div class="divider">第一次使用</div>
    <form id="registerForm" class="stack">
      <input name="username" autocomplete="username" placeholder="註冊姓名">
      <input name="password" autocomplete="new-password" type="password" placeholder="註冊密碼">
      <button class="secondary" type="submit">註冊</button>
    </form>
  </div>
</section>
{% endblock %}
