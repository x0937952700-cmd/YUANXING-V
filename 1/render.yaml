# V26 dream-ui lock: Render build/start kept stable; smoke test retained.
services:
  - type: web
    name: yuanxing
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python tools/smoke_test.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: SECRET_KEY
        generateValue: true
