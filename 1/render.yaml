# V65 Render startup/migration verified
# V59 Render config: releaseCommand runs PostgreSQL migration before web start.
# V58 full warehouse/ship/product repair: Render build/start kept stable; smoke test retained.
services:
  - type: web
    name: yuanxing
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python tools/smoke_test.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    releaseCommand: python -c "from db import init_db; init_db()"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: SECRET_KEY
        generateValue: true
