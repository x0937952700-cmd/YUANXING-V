# Yuanxing mainfile Render config.
# V343 render requirements root fix: keep requirements.txt at repository root.
# V125 mobile zoom: no extra build step; main static files are versioned ?v=145.
services:
  - type: web
    name: yuanxing
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    preDeployCommand: python -c "from db import init_db; init_db()"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false

# V152 network payload compression pack: keep deployment config on mainline.

# V155 DB request guard defaults
# Set higher only if huge reports need longer queries.
# DB_STATEMENT_TIMEOUT_MS: 12000
# DB_IDLE_TX_TIMEOUT_MS: 15000
