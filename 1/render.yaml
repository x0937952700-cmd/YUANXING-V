services:
  - type: web
    name: yuanxing
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python -m gunicorn wsgi:app --config gunicorn.conf.py
    releaseCommand: python -c "from db import init_db; init_db()"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
