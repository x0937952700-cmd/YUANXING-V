# V116 mainfile stability render config.
# V116 warehouse dropdown safe: mainfile startup only
services:
  - type: web
    name: yuanxing
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    preDeployCommand: python -c "from db import init_db; init_db()"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
