{% extends "base.html" %}
{% block body %}
<div class="home-shell yx112-today-initial" data-yx112-today-template="v23-single-card">
  <div class="home-header glass">
    <a class="back-btn" href="{{ url_for('home') }}">← 返回</a>
    <h1 class="brand center">今日異動</h1>
    <div></div>
  </div>
  <div class="glass feature-card yx112-today-single-card">
    <div class="btn-row compact yx112-today-fixed-tools" style="justify-content:flex-end; margin-bottom:10px; gap:8px;">
      <span class="pill" id="today-unread-badge">0</span>
      <button id="yx112-refresh-today" class="ghost-btn small-btn" type="button">刷新</button>
    </div>
    <div class="section-head">
      <h3>今日異動</h3>
    </div>
    <div class="today-filter-bar yx112-today-labels" aria-label="今日異動分類">
      <button class="chip yx112-today-label" type="button" data-today-filter="all"><span>全部</span><strong>0</strong></button>
      <button class="chip yx112-today-label" type="button" data-today-filter="inbound"><span>進貨</span><strong>0</strong></button>
      <button class="chip yx112-today-label" type="button" data-today-filter="outbound"><span>出貨</span><strong>0</strong></button>
      <button class="chip yx112-today-label active" type="button" data-today-filter="orders"><span>新增訂單</span><strong>0</strong></button>
      <button class="chip yx112-today-label" type="button" data-today-filter="unplaced"><span>未錄入倉庫圖</span><strong>0件</strong></button>
    </div>
    <div id="today-summary-cards" class="card-list yx112-today-summary" hidden aria-hidden="true"></div>
    <div class="today-columns today-columns-vertical yx112-single-panel-list">
      <div class="glass panel yx112-today-panel yx112-filter-hidden" data-today-panel="inbound" style="display:none"><div class="section-title">進貨</div><div id="today-inbound-list" class="chip-list stacked-list"><div class="empty-state-card compact-empty yx112-empty">今天沒有進貨</div></div></div>
      <div class="glass panel yx112-today-panel yx112-filter-hidden" data-today-panel="outbound" style="display:none"><div class="section-title">出貨</div><div id="today-outbound-list" class="chip-list stacked-list"><div class="empty-state-card compact-empty yx112-empty">今天沒有出貨</div></div></div>
      <div class="glass panel yx112-today-panel" data-today-panel="orders"><div class="section-title">新增訂單</div><div id="today-order-list" class="chip-list stacked-list"><div class="empty-state-card compact-empty yx112-empty">今天沒有新增訂單</div></div></div>
      <div class="glass panel yx112-today-panel yx112-filter-hidden" data-today-panel="unplaced" style="display:none"><div class="section-title">未錄入倉庫圖</div><div id="today-unplaced-list" class="chip-list stacked-list"><div class="empty-state-card compact-empty yx112-empty">目前沒有未錄入倉庫圖商品</div></div></div>
    </div>
  </div>
  <div id="fix28-operation-anchor"></div>
</div>
{% endblock %}
